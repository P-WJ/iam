<html lang="ko">
<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Pretendard Variable"', 'Pretendard', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'Roboto', 'sans-serif'],
                    }

    <style>
        html {
            scroll-behavior: smooth;
            scroll-padding-top: 80px;
        }

        body {
            color: #E2E8F0;
            overflow-x: hidden;
            background-color: #09090b;
        }

        .glass-panel {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .fade-up {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }
        .fade-up.visible {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .btn-pulse:hover {
            animation: pulse-soft 1s infinite;
        }

        .nav-link.active {
            color: #fbbf24 !important;
        }
        .nav-link.active::after {
            width: 100% !important;
        }
    </style>
</head>

<body class="antialiased font-sans selection:bg-amber-400 selection:text-zinc-900">

        <div class="absolute -bottom-10 -left-10 w-[60vw] h-[70vh] opacity-60"

    </div>

            <a href="index.html" class="text-amber-400 font-black text-3xl tracking-tighter cursor-pointer hover:scale-105 transition-transform">WOOJIN</a>

            <div class="hidden md:flex gap-8 text-sm font-bold text-zinc-400">
                <a href="index.html" class="nav-link hover:text-white transition-colors relative after:content-[''] after:absolute after:-bottom-2 after:left-0 after:w-0 after:h-[2px] after:bg-amber-400 hover:after:w-full after:transition-all after:duration-300">Home</a>
                <a href="profile.html" class="nav-link hover:text-white transition-colors relative after:content-[''] after:absolute after:-bottom-2 after:left-0 after:w-0 after:h-[2px] after:bg-amber-400 hover:after:w-full after:transition-all after:duration-300">Profile</a>
                <a href="story.html" class="nav-link hover:text-white transition-colors relative after:content-[''] after:absolute after:-bottom-2 after:left-0 after:w-0 after:h-[2px] after:bg-amber-400 hover:after:w-full after:transition-all after:duration-300">Story</a>
                <a href="hobby.html" class="nav-link active hover:text-white transition-colors relative after:content-[''] after:absolute after:-bottom-2 after:left-0 after:w-full after:h-[2px] after:bg-amber-400">Hobby</a>

        <div class="max-w-5xl mx-auto px-6 relative z-10 w-full">

            <div class="grid md:grid-cols-2 gap-8">

                    <div class="w-16 h-16 rounded-full bg-zinc-900 flex items-center justify-center mb-6 group-hover:scale-110 transition-transform border border-white/5">

                    </p>
                    <div class="flex gap-2">
                        <span class="inline-block bg-zinc-900/80 border border-white/5 text-zinc-400 text-sm px-4 py-1.5 rounded-full">#승부욕</span>

    <footer id="contact" class="glass-panel border-x-0 border-b-0 py-16 text-center relative z-10">
        <div class="max-w-4xl mx-auto px-6">

            <a href="mailto:pwj1103@naver.com" class="inline-flex items-center gap-3 text-xl md:text-2xl font-medium text-zinc-300 hover:text-amber-400 transition-colors mb-10 group">
                <i class="fa-regular fa-envelope group-hover:scale-110 transition-transform"></i>
                pwj1103@naver.com
            </a>

            <div class="text-sm text-zinc-500 mt-10">
                <p class="mt-2">© 2026 박우진. 구미 4반 파이팅.</p>
            </div>
        </div>
    </footer>

    <script>
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            const icon = document.querySelector('#mobile-menu-btn i');
            menu.classList.toggle('hidden');

            if (menu.classList.contains('hidden')) {
                icon.classList.remove('fa-xmark');
                icon.classList.add('fa-bars');
            } else {
                icon.classList.remove('fa-bars');
                icon.classList.add('fa-xmark');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const fadeObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { root: null, rootMargin: '0px', threshold: 0.15 });

            document.querySelectorAll('.fade-up').forEach(el => fadeObserver.observe(el));
        });
    </script>
</body>
</html>
